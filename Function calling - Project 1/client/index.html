<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנהל המשימות שלי</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        #root { width: 90%; max-width: 600px; height: 90vh; }
        .chat-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; word-wrap: break-word; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: #667eea; color: white; align-self: flex-start; border-bottom-right-radius: 4px; }
        .bot { background: #f0f0f0; color: #333; align-self: flex-end; border-bottom-left-radius: 4px; }
        .input-area { display: flex; padding: 20px; border-top: 1px solid #eee; gap: 10px; }
        input { flex: 1; padding: 12px 16px; border: 2px solid #eee; border-radius: 25px; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #667eea; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: scale(1); }
        .loading { text-align: center; color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function ChatApp() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(scrollToBottom, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setMessages(prev => [...prev, { text: userMessage, sender: 'user' }]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch('http://127.0.0.1:8000/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMessage })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { text: data.reply, sender: 'bot' }]);
                } catch (error) {
                    setMessages(prev => [...prev, { text: 'שגיאה בתקשורת עם השרת', sender: 'bot' }]);
                }
                setLoading(false);
            };

            return (
                <div className="chat-container">
                    <div className="chat-header">🤖 מנהל המשימות החכם</div>
                    <div className="messages">
                        {messages.map((msg, i) => (
                            <div key={i} className={`message ${msg.sender}`}>{msg.text}</div>
                        ))}
                        {loading && <div className="loading">מחשב תשובה...</div>}
                        <div ref={messagesEndRef} />
                    </div>
                    <div className="input-area">
                        <input
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                            placeholder="כתבי כאן את הבקשה שלך..."
                            disabled={loading}
                        />
                        <button onClick={sendMessage} disabled={loading}>שלח</button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ChatApp />, document.getElementById('root'));
    </script>
</body>
</html>
